<div id="remarkModal" class="modal-overlay" hidden>
    <section class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle">備考</h2>
        <p id="remarkHelp" class="field-help">
            勤務時間などを500文字以内で入力します。相談内容や個人情報は書かないでください。
        </p>
        <label for="modalTextarea">備考</label>
        <textarea id="modalTextarea" class="modal-textarea" maxlength="500"
                  aria-describedby="remarkHelp remarkCount"></textarea>
        <p id="remarkCount" class="character-count" aria-live="polite">残り500文字</p>
        <div class="modal-actions">
            <button type="button" id="modalSaveBtn" class="btn btn-primary">この備考を反映</button>
            <button type="button" id="modalCancelBtn" class="btn btn-secondary">閉じる</button>
        </div>
    </section>
</div>

<script nonce="{{ csp_nonce }}">
    (function () {
        var modal = document.getElementById('remarkModal');
        var modalTitle = document.getElementById('modalTitle');
        var modalTextarea = document.getElementById('modalTextarea');
        var count = document.getElementById('remarkCount');
        var currentDay = null;
        var opener = null;

        function updateCount() {
            count.textContent = '残り' + (500 - modalTextarea.value.length) + '文字';
        }

        function closeRemark() {
            modal.hidden = true;
            document.body.classList.remove('modal-open');
            if (opener) {
                opener.focus();
            }
        }

        function openRemark(day, button) {
            currentDay = day;
            opener = button;
            modalTitle.textContent = day + '日の備考';
            modalTextarea.value = document.getElementById('input_remark_' + day).value;
            updateCount();
            modal.hidden = false;
            document.body.classList.add('modal-open');
            modalTextarea.focus();
        }

        function saveRemark() {
            var value = modalTextarea.value;
            var hidden = document.getElementById('input_remark_' + currentDay);
            var button = document.getElementById('btn_remark_' + currentDay);
            hidden.value = value;
            button.classList.toggle('has-value', value.trim() !== '');
            button.textContent = value.trim() !== '' ? '備考あり' : '備考を追加';
            closeRemark();
        }

        document.querySelectorAll('.btn-remark-open').forEach(function (button) {
            button.addEventListener('click', function (event) {
                openRemark(event.currentTarget.dataset.day, event.currentTarget);
            });
        });
        modalTextarea.addEventListener('input', updateCount);
        document.getElementById('modalSaveBtn').addEventListener('click', saveRemark);
        document.getElementById('modalCancelBtn').addEventListener('click', closeRemark);
        modal.addEventListener('click', function (event) {
            if (event.target === modal) closeRemark();
        });
        document.addEventListener('keydown', function (event) {
            if (modal.hidden) return;
            if (event.key === 'Escape') {
                closeRemark();
                return;
            }
            if (event.key === 'Tab') {
                var controls = Array.from(
                    modal.querySelectorAll('textarea, button')
                ).filter(function (element) {
                    return !element.disabled;
                });
                var first = controls[0];
                var last = controls[controls.length - 1];
                if (event.shiftKey && document.activeElement === first) {
                    event.preventDefault();
                    last.focus();
                } else if (!event.shiftKey && document.activeElement === last) {
                    event.preventDefault();
                    first.focus();
                }
            }
        });
    })();
</script>
