<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>パスワード変更</title>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 60px; padding: 30px;">
        <h1>パスワード変更</h1>
        <a href="{{ url_for('login') }}" class="btn-back">キャンセルして戻る</a>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="post">
            <label>ユーザーID</label><input type="text" name="username" required>
            <label>現在のパスワード</label><input type="password" name="password_current" required>
            <label>新しいパスワード (4文字以上英数)</label><input type="password" name="password_new" required>
            <button type="submit" class="menu-btn btn-entry" style="width: 100%; border: none;">変更を保存</button>
        </form>
    </div>
</body>
</html>
