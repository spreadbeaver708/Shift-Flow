<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>パスワード変更</title>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 60px; padding: 30px;">
        <h1>パスワード変更</h1>
        <p style="color:#666; font-size:0.9rem;">
            {{ current_user.name }} さん（ID: {{ current_user.username }}）
        </p>

        {% if current_user.must_change_password %}
        <div class="error" style="background:#fff8e1; color:#7a5a00; border:1px solid #FFB300; padding:10px; border-radius:6px; margin-bottom:15px;">
            初回ログインのため、パスワード変更が必須です。新しいパスワードを設定してください。
        </div>
        {% endif %}

        {% if not current_user.must_change_password %}
            <a href="{{ url_for('menu') }}" class="btn-back">← メニューに戻る</a>
        {% endif %}

        {% if error %}<p class="error">{{ error }}</p>{% endif %}

        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>現在のパスワード</label>
            <input type="password" name="password_current" required autocomplete="current-password">
            <label>新しいパスワード (8文字以上)</label>
            <input type="password" name="password_new" required autocomplete="new-password">
            <button type="submit" class="menu-btn btn-entry" style="width: 100%; border: none;">変更を保存</button>
        </form>

        <div style="text-align:center; margin-top: 20px;">
            <a href="{{ url_for('logout') }}" style="color: #888; text-decoration: none; font-size: 0.85rem;">ログアウト</a>
        </div>
    </div>
</body>
</html>
