<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>確定シフトの作成/編集</title>
</head>
<body>
    <div class="container">
        <h1>確定シフトの作成/編集（{{ year }}/{{ month }}）</h1>
        <a href="{{ url_for('menu') }}" class="btn-back">← メニューに戻る</a>

        <div style="display: flex; gap: 8px; margin-bottom: 20px; justify-content: center;">
            <a href="{{ url_for('confirm', year=now_y, month=now_m) }}" class="btn-month {% if year==now_y and month==now_m %}active-month{% endif %}" style="background: var(--entry); border-bottom-color: #388E3C;">今月 ({{ now_m }}月)</a>
            <a href="{{ url_for('confirm', year=next_y, month=next_m) }}" class="btn-month {% if year==next_y and month==next_m %}active-month{% endif %}" style="background: var(--confirm); border-bottom-color: #E68A00;">翌月 ({{ next_m }}月)</a>
        </div>

        <p style="color:#888; font-size:0.85rem;">職員を選んで、その人の確定シフト（出勤日）を編集します。職員には「確定シフトを見る」で全体が公開されます。</p>

        <table style="width:100%; border-collapse:collapse;">
            {% for it in items %}
            <tr style="border-bottom:1px solid #eee;">
                <td style="padding:10px;">
                    <span style="display:inline-block; width:12px; height:12px; background:{{ it.color }}; border-radius:50%; border:1px solid #ccc;"></span>
                    <b>{{ it.name }}</b>
                    <span style="color:#999; font-size:0.8rem;">確定 {{ it.confirmed_ok }} 日</span>
                </td>
                <td style="text-align:right;">
                    <a href="{{ url_for('confirm_user', username=it.username, year=year, month=month) }}"
                       class="btn-month" style="background:var(--manage); padding:6px 14px; font-size:0.8rem;">編集</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
