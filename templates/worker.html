<!DOCTYPE html>
<html>
<head>
    <title>{{ name }} 勤務入力</title>
</head>
<body>

<h1>{{ name }} さんの勤務入力</h1>

<form method="POST">

    <input type="hidden" name="year" value="{{ year }}">
    <input type="hidden" name="month" value="{{ month }}">

    <table border="1">
        <tr>
            <th>日付</th>
            <th>勤務</th>
        </tr>

        {% for day in work_days %}
        <tr>
            <td>{{ day }}日</td>
            <td>
                <select name="{{ day }}">
                    <option value="出勤">出勤</option>
                    <option value="休暇">休暇</option>
                </select>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <button type="submit">保存</button>

</form>

</body>
</html>
