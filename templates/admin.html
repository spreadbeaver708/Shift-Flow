<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>
    <style>
        body { font-family: Arial, sans-serif; max-width:900px; margin:30px auto; }
        table { border-collapse: collapse; width:100%; }
        th, td { border:1px solid #ccc; text-align:center; padding:5px; vertical-align:top; width:14%; }
        .day-number { font-weight:bold; margin-bottom:5px; display:block; }
        .btn-back {
            display: inline-block;
            background-color: #666;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .btn-back:hover { background-color: #555; }
    </style>
</head>
<body>

<h1>管理画面（{{ year }}/{{ month }}）</h1>

<a href="{{ url_for('menu') }}" class="btn-back">← メニューに戻る</a>

<form method="get">
    <label>年：
        <input type="number" name="year" value="{{ year }}">
    </label>
    <label>月：
        <input type="number" name="month" value="{{ month }}" min="1" max="12">
    </label>
    <button type="submit">表示</button>
</form>

<br>

<table>
<tr>
<th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
</tr>

{% for week in cal %}
<tr>
    {% for day in week %}
        {% set i = loop.index0 %}
        {% if day == 0 %}
            <td>-</td>
        {% else %}
            <td>
                <span class="day-number">{{ day }}</span>
                {% for row in rows %}
                    {% if row[0] == day and row[2] == '〇' %}
                        {{ row[1] }}<br>
                    {% endif %}
                {% endfor %}
            </td>
        {% endif %}
    {% endfor %}
</tr>
{% endfor %}

</table>

</body>
</html>
