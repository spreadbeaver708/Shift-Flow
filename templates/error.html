{% extends "base.html" %}

{% block title %}{{ code }} {{ title }}{% endblock %}
{% block container_class %}container-narrow error-page{% endblock %}

{% block content %}
<p class="error-code">{{ code }}</p>
<h1>{{ title }}</h1>
<p>{{ message }}</p>
{% if current_user %}
    <a href="{{ url_for('menu') }}" class="btn btn-primary">メニューに戻る</a>
{% else %}
    <a href="{{ url_for('login') }}" class="btn btn-primary">ログイン画面へ</a>
{% endif %}
{% endblock %}
