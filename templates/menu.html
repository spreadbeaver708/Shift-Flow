<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>メニュー</title>
</head>
<body>
    <div class="container" style="text-align: center; max-width: 500px; margin-top: 50px; padding: 30px;">
        <h1 style="color: #333;">こんにちは、{{ session['name'] }}さん</h1>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        {% if session['role'] == 'admin' %}
            <a href="{{ url_for('index') }}" class="menu-btn btn-entry">シフト入力 (管理者)</a>
            <a href="{{ url_for('manage_users') }}" class="menu-btn btn-manage">ユーザー管理</a>
        {% else %}
            <a href="{{ url_for('worker', name=session['name']) }}" class="menu-btn btn-entry">自分のシフト入力</a>
        {% endif %}

        <a href="{{ url_for('admin') }}" class="menu-btn btn-confirm">全体のシフト確認</a>

        <div style="margin-top: 40px;">
            <a href="{{ url_for('logout') }}" style="color: #888; text-decoration: none; font-size: 0.9rem;">ログアウト</a>
        </div>
    </div>
</body>
</html>
