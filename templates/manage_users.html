<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>ユーザー管理</title>
</head>
<body>
    <div class="container">
        <h1>ユーザー管理</h1>
        <a href="{{ url_for('menu') }}" class="btn-back">← メニューに戻る</a>

        <div style="background:#f9f9f9; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:20px;">
            <form method="post">
                <input type="hidden" name="action" value="add">
                <input type="text" name="username" placeholder="ユーザーID" required>
                <input type="password" name="password" placeholder="パスワード" required>
                <input type="text" name="name" placeholder="お名前" required>
                色：<input type="color" name="color" value="#e8f5e9" style="width:50px; height:30px; vertical-align:middle;">
                <select name="role"><option value="worker">職員</option><option value="admin">管理者</option></select>
                <button type="submit">新規登録</button>
            </form>
        </div>

        <table style="width:100%; border-collapse:collapse;">
            {% for user in users %}
            <tr style="border-bottom:1px solid #eee;">
                <td style="padding:10px;">
                    <span style="display:inline-block; width:12px; height:12px; background:{{user[4]}}; border-radius:50%;"></span>
                    {{ user[2] }} ({{ user[0] }})
                </td>
                <td style="text-align:right;">
                    {% if user[0] != 'admin' %}
                    <form method="post" style="display:inline;">
                        <input type="hidden" name="action" value="toggle">
                        <input type="hidden" name="username" value="{{ user[0] }}">
                        <input type="hidden" name="current_status" value="{{ user[3] }}">
                        <button type="submit" style="width:auto; padding:5px 10px; font-size:0.7rem; background:{{ '#FF5722' if user[3]==1 else '#2196F3' }};">{{ '停止' if user[3]==1 else '復活' }}</button>
                    </form>
                    <form method="post" style="display:inline;" onsubmit="return confirm('本当に削除しますか？');">
                        <input type="hidden" name="action" value="delete">
                        <input type="hidden" name="username" value="{{ user[0] }}">
                        <button type="submit" style="width:auto; padding:5px 10px; font-size:0.7rem; background:#666;">削除</button>
                    </form>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
