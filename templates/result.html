<!DOCTYPE html>
<html>
<head>
    <title>確認画面</title>
</head>
<body>

<h1>入力結果</h1>

<table border="1">
<tr>
    <th>日付</th>
    {% for member in members %}
        <th>{{ member }}</th>
    {% endfor %}
</tr>

{% for day in work_days %}
<tr>
    <td>{{ day }}日</td>
    {% for member in members %}
        <td>{{ data[member + "_" + day|string] }}</td>
    {% endfor %}
</tr>
{% endfor %}

</table>

</body>
</html>
