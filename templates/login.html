<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>ログイン</title>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 60px; padding: 30px;">
        <h1 style="margin-bottom: 30px;">ログイン</h1>
        {% if error %}<p style="color:red; text-align:center; font-size: 0.9rem;">{{ error }}</p>{% endif %}
        <form method="post">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #555;">ID</label>
                <input type="text" name="username" required>
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #555;">PASSWORD</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="menu-btn btn-entry" style="width: 100%; border: none;">ログイン</button>
        </form>
    </div>
</body>
</html>
