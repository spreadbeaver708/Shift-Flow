<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>ログイン</title>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 60px; padding: 30px;">
        <h1>ログイン</h1>
        {% with msgs = get_flashed_messages() %}
          {% if msgs %}<p style="color:green; text-align:center;">{{ msgs[0] }}</p>{% endif %}
        {% endwith %}
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="post">
            <div style="margin-bottom: 15px;"><label>ID</label><input type="text" name="username" required></div>
            <div style="margin-bottom: 25px;"><label>PASSWORD</label><input type="password" name="password" required></div>
            <button type="submit" class="menu-btn btn-entry" style="width: 100%; border: none;">ログイン</button>
        </form>
        <a href="{{ url_for('change_password') }}" class="menu-btn btn-confirm" style="font-size: 0.8rem; padding: 10px; margin-top: 20px;">PASSWORDを変更</a>
    </div>
</body>
</html>
