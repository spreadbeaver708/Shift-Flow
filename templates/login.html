{% extends "base.html" %}

{% block title %}ログイン{% endblock %}
{% block container_class %}container-narrow{% endblock %}

{% block content %}
<header class="page-header">
    <h1>ログイン</h1>
    <p>IDとパスワードを入れてください。</p>
</header>

{% if error %}<div class="notice notice-error" role="alert">{{ error }}</div>{% endif %}

<form method="post" class="stack-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
        <label for="login_username">ユーザーID</label>
        <input id="login_username" type="text" name="username" required
               autocomplete="username" autocapitalize="none">
    </div>
    <div class="field">
        <label for="login_password">パスワード</label>
        <input id="login_password" type="password" name="password" required
               autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary btn-block">ログイン</button>
</form>

<div class="sub-links">
    <a href="{{ url_for('help_page') }}">使い方を見る</a>
</div>
{% endblock %}
