<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>ログイン</title>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 60px; padding: 30px;">
        <h1 style="margin-bottom: 30px;">ログイン</h1>
        
        {% with msgs = get_flashed_messages() %}
          {% if msgs %}<p style="color:green; text-align:center; font-weight:bold;">{{ msgs[0] }}</p>{% endif %}
        {% endwith %}

        {% if error %}<p class="error">{{ error }}</p>{% endif %}

        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold;">ユーザーID</label>
                <input type="text" name="username" placeholder="IDを入力" required>
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; font-weight: bold;">パスワード</label>
                <input type="password" name="password" placeholder="パスワードを入力" required>
            </div>
            <button type="submit" class="menu-btn btn-entry" style="width: 100%; border: none;">ログイン</button>
        </form>

        <a href="{{ url_for('change_password') }}" class="menu-btn btn-confirm" style="font-size: 0.8rem; padding: 10px; margin-top: 20px;">PASSWORDを変更</a>

        <div style="text-align:center; margin-top: 25px;">
            <a href="{{ url_for('help_page') }}" style="color: #888; text-decoration: none; font-size: 0.85rem;">使い方を見る</a>
        </div>
    </div>
</body>
</html>
