<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>404 ページが見つかりません</title>
</head>
<body>
    <div class="container" style="max-width: 500px; margin-top: 60px; padding: 30px; text-align:center;">
        <h1 style="color:#2196F3; margin-bottom: 10px;">404</h1>
        <p style="font-size:1.1rem; color:#444; margin: 10px 0 20px;">ページが見つかりません</p>
        <p style="color:#666; font-size:0.9rem; line-height:1.7;">
            お探しのページは存在しないか、URL が変更されている可能性があります。<br>
            メニューから操作をやり直してください。
        </p>
        {% if current_user %}
            <a href="{{ url_for('menu') }}" class="menu-btn btn-entry" style="margin-top:25px;">メニューに戻る</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="menu-btn btn-entry" style="margin-top:25px;">ログイン画面へ</a>
        {% endif %}
    </div>
</body>
</html>
