# Render Blueprint — Shift-Flow を本番公開するための設定ファイル
#
# 使い方:
#   Render で「New +」→「Blueprint」→ このリポジトリを接続すると、
#   このファイルから Web サービス・データベースの保存場所・HTTPS などが自動で作られます。
#
# あなたが手で入力するのは ADMIN_INIT_PASSWORD（管理者の初期パスワード）だけです。
# 詳しい手順は README.md「2. Render で公開する」を参照してください。

services:
  - type: web
    name: shift-flow
    runtime: python
    plan: starter              # 永続ディスクを使うには有料プランが必要（無料プランでは不可）
    region: singapore          # 日本にいちばん近いリージョン
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /healthz  # 起動の生存確認に使うURL（アプリに実装済み）

    # 永続ディスク = 再公開・再起動してもデータが消えない保存場所
    disk:
      name: shift-data
      mountPath: /var/data     # この中だけが消えずに残る
      sizeGB: 1                # 10人規模なら 1GB で十分

    envVars:
      - key: APP_ENV
        value: production
      - key: SHIFT_DB_PATH
        value: /var/data/shift.db   # データベースを「消えない場所」に置く
      - key: TRUSTED_PROXY_HOPS
        value: "1"                  # Render はプロキシ経由のため 1（HTTPS判定とIP別レート制限に必要）
      - key: SESSION_IDLE_MINUTES
        value: "30"                 # 無操作でこの分数を過ぎると自動ログアウト（個人端末の置き忘れ対策）
      - key: TRUST_CF_CONNECTING_IP
        value: "1"                  # 前段がCloudflare/Renderエッジのため、真のクライアントIPを CF-Connecting-IP から取得（レート制限・監査ログの精度）
      - key: LOGIN_RATE_LIMIT
        value: "20 per minute"      # ログイン試行の上限（10名運用で締め出されにくく）。必要なら調整
      - key: PYTHON_VERSION
        value: "3.14.5"             # 3.14.5 で GC が generational に戻り本番のメモリ挙動が安定（動作再現性のため固定）
      - key: SECRET_KEY
        generateValue: true         # Render が安全なランダム値を自動生成（手入力不要）
      - key: ADMIN_INIT_PASSWORD
        sync: false                 # 秘密の値。初回デプロイ前に手入力。admin 作成後は本番 env から削除推奨（以後は未使用）
